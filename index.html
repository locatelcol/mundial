<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Fullscreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #yt-player {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100vh * (16/9) * 1.1);
      height: calc(100vh * 1.1);
      min-width: 110vw;
      pointer-events: none;
      border: none;
    }
  </style>
</head>
<body>

<div id="player-wrapper">
  <iframe
    id="yt-player"
    allow="autoplay; encrypted-media"
    allowfullscreen
  ></iframe>
</div>

<script>
  function extractYouTubeId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/\s]{11})/,
      /youtube\.com\/shorts\/([^&?/\s]{11})/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function buildEmbedUrl(videoId) {
    const params = new URLSearchParams({
      autoplay:       '1',
      loop:           '1',
      playlist:       videoId,
      controls:       '0',
      modestbranding: '1',
      rel:            '0',
      showinfo:       '0',
      iv_load_policy: '3',
      mute:           '0'
    });
    return `https://www.youtube.com/embed/${videoId}?${params}`;
  }

  fetch('./config.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('No se encontró config.json');
      return r.json();
    })
    .then(cfg => {
      const videoId = extractYouTubeId(cfg.video_url);
      if (!videoId) {
        console.error('No se pudo extraer el ID de YouTube:', cfg.video_url);
        return;
      }
      document.getElementById('yt-player').src = buildEmbedUrl(videoId);
    })
    .catch(err => console.error(err));
</script>

</body>
</html>
