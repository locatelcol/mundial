<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Fullscreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
    }
    #yt-player {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<!-- La API de YouTube requiere un div, no un iframe directo -->
<div id="yt-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player;

  function extractYouTubeId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/\s]{11})/,
      /youtube\.com\/shorts\/([^&?/\s]{11})/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function onYouTubeIframeAPIReady() {
    fetch('./config.json?t=' + Date.now())
      .then(r => r.json())
      .then(cfg => {
        const videoId = extractYouTubeId(cfg.video_url);

        player = new YT.Player('yt-player', {
          videoId: videoId,
          playerVars: {
            autoplay:       1,
            mute:           1,   // arranca muteado para que YouTube lo permita
            controls:       0,
            modestbranding: 1,
            rel:            0,
            iv_load_policy: 3,
            enablejsapi:    1,
          },
          events: {
            onReady: onPlayerReady,
          }
        });
      })
      .catch(err => console.error(err));
  }

  function onPlayerReady(event) {
    event.target.playVideo();

    // Desmutea automáticamente después de que arranca
    setTimeout(() => {
      player.unMute();
      player.setVolume(100);
    }, 1500);
  }
</script>

</body>
</html>
